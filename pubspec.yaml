  #  google_fonts:
  #  font_awesome_flutter: ^9.2.0
  flutter_svg: ^2.0.6
  form_field_validator: ^1.1.0
  clay_containers: ^0.3.4
  #  webview_flutter: ^4.13.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  #  firebase_core: ^2.28.0
  #  firebase_messaging: ^14.8.0
  get: ^4.6.6
  image_picker: ^1.0.7
  dio: ^5.4.0
  http_parser: ^4.0.2
  device_info_plus: ^10.1.0
  #  flutter_local_notifications: ^17.0.0
  permission_handler: ^12.0.1
  #  mobile_scanner: ^5.2.1
  package_info_plus: ^8.0.0
  cached_network_image: ^3.3.1
  #  fl_chart: ^0.66.0
  path_provider: ^2.1.1

  #  flutter_inappwebview: ^6.0.0
  #  file_picker: ^8.0.0
  open_filex: ^4.4.0
  #dio: ^5.4.0
  #path_provider: ^2.1.2
  #open_filex: ^4.4.0
  #url_launcher: ^6.2.4
#  media_scanner: ^2.1.0
  photo_manager: ^3.0.0
#  android_intent_plus: ^5.2.0
  android_intent_plus: ^6.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.3

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/font/

  fonts:
    - family: BricolageGrotesque
      fonts:
        - asset: assets/font/static/BricolageGrotesque-Regular.ttf
        - asset: assets/font/static/BricolageGrotesque-Light.ttf
          weight: 300
        - asset: assets/font/static/BricolageGrotesque-Medium.ttf
          weight: 500
        - asset: assets/font/static/BricolageGrotesque-SemiBold.ttf
          weight: 600
        - asset: assets/font/static/BricolageGrotesque-Bold.ttf
          weight: 700
        - asset: assets/font/static/BricolageGrotesque-ExtraBold.ttf
          weight: 800
        - asset: assets/font/static/BricolageGrotesque-ExtraLight.ttf
          weight: 200

    - family: BricolageGrotesqueCondensed
      fonts:
        - asset: assets/font/static/BricolageGrotesque_Condensed-Regular.ttf
        - asset: assets/font/static/BricolageGrotesque_Condensed-Light.ttf
          weight: 300
        - asset: assets/font/static/BricolageGrotesque_Condensed-Medium.ttf
          weight: 500
        - asset: assets/font/static/BricolageGrotesque_Condensed-SemiBold.ttf
          weight: 600
        - asset: assets/font/static/BricolageGrotesque_Condensed-Bold.ttf
          weight: 700
        - asset: assets/font/static/BricolageGrotesque_Condensed-ExtraBold.ttf
          weight: 800
        - asset: assets/font/static/BricolageGrotesque_Condensed-ExtraLight.ttf
          weight: 200

    - family: BricolageGrotesqueSemiCondensed
      fonts:
        - asset: assets/font/static/BricolageGrotesque_SemiCondensed-Regular.ttf
        - asset: assets/font/static/BricolageGrotesque_SemiCondensed-Light.ttf
          weight: 300
        - asset: assets/font/static/BricolageGrotesque_SemiCondensed-Medium.ttf
          weight: 500
        - asset: assets/font/static/BricolageGrotesque_SemiCondensed-SemiBold.ttf
          weight: 600
        - asset: assets/font/static/BricolageGrotesque_SemiCondensed-Bold.ttf
          weight: 700
        - asset: assets/font/static/BricolageGrotesque_SemiCondensed-ExtraBold.ttf
          weight: 800
        - asset: assets/font/static/BricolageGrotesque_SemiCondensed-ExtraLight.ttf
          weight: 200

    - family: BricolageGrotesqueVariable
      fonts:
        - asset: assets/font/BricolageGrotesque-VariableFont_opsz,wdth,wght.ttf



flutter_launcher_icons:
  #  android: "launcher_icon"
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon.jpg"
  min_sdk_android: 21
