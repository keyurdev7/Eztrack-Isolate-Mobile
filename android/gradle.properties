#org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
#android.useAndroidX=true
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
android.useAndroidX=true
org.gradle.daemon=true
org.gradle.parallel=true

# Workaround: Android Studio's bundled JBR (17.0.7) can crash the Gradle daemon
# on Apple Silicon with "Internal Error (assembler_aarch64.hpp:267) ... Field too big for insn".
# Force Gradle to use the system JDK instead.
org.gradle.java.home=/Library/Java/JavaVirtualMachines/jdk-17.jdk/Contents/Home
